<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气查询</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #weather {
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border-radius: 15px;
            border: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        #getWeatherBtn, #getWeatherByCityBtn {
            border-radius: 50px;
            padding: 10px 20px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        #getWeatherBtn:hover, #getWeatherByCityBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        #weatherResult {
            border-radius: 10px;
            background: #f0f8ff;
            transition: all 0.3s ease;
        }
        .input-group {
            border-radius: 50px;
            overflow: hidden;
        }
        .input-group input {
            border: none;
            border-radius: 0;
        }
        .input-group button {
            border-radius: 0;
        }
    </style>
</head>
<body>
            <section id="weather" class="py-5">
            <div class="container">
                <div class="row">
                    <div class="col-lg-8 mx-auto">
                        <h2 class="mb-4 text-center text-white">天气查询</h2>
                        <div class="card shadow-lg">
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-6">
                                        <h5 class="card-title mb-3">获取当前天气</h5>
                                        <p class="mb-4 text-muted">点击按钮获取您当前位置的天气信息</p>
                                        <button id="getWeatherBtn" class="btn btn-primary btn-lg mb-4">
                                            <i class="bi bi-cloud-sun"></i> 获取天气
                                        </button>
                                        <div class="mb-3">
                                            <label for="cityInput" class="form-label text-muted">或输入城市名称查询</label>
                                            <div class="input-group">
                                                <input type="text" class="form-control" id="cityInput" placeholder="例如：北京">
                                                <button id="getWeatherByCityBtn" class="btn btn-secondary">查询</button>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <h5 class="card-title mb-3">天气信息</h5>
                                        <div id="weatherResult" class="border rounded p-4" style="min-height: 250px;">
                                            <p class="text-muted">请点击按钮获取天气信息</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
            <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
