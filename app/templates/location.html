<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>位置查询</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #location {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border-radius: 15px;
            border: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        #getLocationBtn {
            border-radius: 50px;
            padding: 12px 30px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        #getLocationBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        #locationResult {
            border-radius: 10px;
            background: #f8f9fa;
            transition: all 0.3s ease;
        }
        .display-3 {
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <section id="location" class="py-5">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <h2 class="mb-4 text-center text-white">位置查询</h2>
                <div class="card shadow-lg">
                    <div class="card-body text-center">
                        <i class="bi bi-geo-alt-fill text-success display-3 mb-4"></i>
                        <h5 class="card-title mb-3">获取当前位置</h5>
                        <p class="mb-4 text-muted">点击按钮获取您的当前位置信息</p>
                        <button id="getLocationBtn" class="btn btn-success btn-lg mb-4">
                            <i class="bi bi-location-arrow"></i> 获取位置
                        </button>
                        <div id="locationResult" class="border rounded p-4" style="min-height: 150px;">
                            <p class="text-muted">请点击按钮获取位置信息</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
    <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
